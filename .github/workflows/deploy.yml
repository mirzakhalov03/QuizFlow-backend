name: Continuous Deployment

on:
  push:
    branches: [main, master]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Run linter
        run: npm run lint

      - name: Run unit & integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          ACCESS_TOKEN_SECRET: dummy-access-token-secret-for-testing
          REFRESH_TOKEN_SECRET: dummy-refresh-token-secret-for-testing
          API_KEY_ENCRYPTION_SECRET: dummy-api-key-encryption-secret-for-testing
          EMAIL_ADDRESS: dummy@email.com
          EMAIL_APP_PASSWORD: dummyemailpassword
          AWS_REGION: dummyregion
          AWS_BUCKET_NAME: dummybucketname
          AWS_ACCESS_KEY_ID: dummykeyid
          AWS_SECRET_ACCESS_KEY: dummyaccesskey
          LAMBDA_QUIZ_GENERATOR_ARN: dummyvalue
        run: npm run test

      - name: Compile application
        run: npm run build

  deploy-lambda:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile application
        run: npm run build

      - name: Deploy to AWS Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          LAMBDA_QUIZ_GENERATOR_ARN: ${{ secrets.LAMBDA_QUIZ_GENERATOR_ARN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}
        run: npm run deploy:lambda

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: deploy-lambda
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ship the source the box needs to build the image (not dist/ — the
      # Dockerfile compiles it). node_modules/dist/.env are excluded by
      # .dockerignore from the build context.
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'Dockerfile,.dockerignore,docker-compose.prod.yml,tsconfig.json,package.json,package-lock.json,src'
          target: '/home/ec2-user/app'

      - name: Build image and restart containers on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Fail the step (red build) if any command below fails — without
            # this, a failed `up` gets masked by a later succeeding command.
            set -e
            cd /home/ec2-user/app
            # `docker compose build` needs the buildx plugin; install it if the
            # box doesn't have it (e.g. a fresh/re-imaged host).
            if ! docker buildx version >/dev/null 2>&1; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64" \
                -o /usr/local/lib/docker/cli-plugins/docker-buildx
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            fi
            # Build the API+worker image and (re)start both containers. Chromium
            # and its OS libs are baked into the image by the Dockerfile, so
            # there's no host-side package install here anymore.
            docker compose -f docker-compose.prod.yml up -d --build
            # Reclaim disk from the previous image layers.
            docker image prune -f
